<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Definitions for gradients and filters -->
  <defs>
    <!-- Background Glow Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" /> <!-- Violet 500 -->
      <stop offset="100%" stop-color="#4F46E5" /> <!-- Indigo 600 -->
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EC4899" /> <!-- Pink 500 -->
      <stop offset="100%" stop-color="#8B5CF6" /> <!-- Violet 500 -->
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Rounded Container with subtle border -->
  <rect x="10" y="10" width="180" height="180" rx="40" fill="#09090b" stroke="#27272a" stroke-width="3" />

  <!-- Glowing Background Mesh / Grid Pattern lines -->
  <path d="M50 10v180M100 10v180M150 10v180M10 50h180M10 100h180M10 150h180" stroke="#18181b" stroke-width="1.5" />

  <!-- Chat Bubble Body (AI Aspect) -->
  <path d="M45 55 h90 a20 20 0 0 1 20 20 v40 a20 20 0 0 1-20 20 h-50 l-25 20 v-20 a20 20 0 0 1-25-20 v-40 a20 20 0 0 1 20-20 z" 
        fill="url(#bgGrad)" opacity="0.15" />
  
  <!-- Glowing Chat Bubble Outline -->
  <path d="M45 55 h90 a20 20 0 0 1 20 20 v40 a20 20 0 0 1-20 20 h-50 l-25 20 v-20 a20 20 0 0 1-25-20 v-40 a20 20 0 0 1 20-20 z" 
        stroke="url(#bgGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)" />

  <!-- Play Symbol (Video Aspect) inside the Chat Bubble -->
  <polygon points="85,75 125,95 85,115" fill="url(#accentGrad)" filter="url(#glow)" />

  <!-- AI Sparks/Stars -->
  <!-- Top Right Sparkle -->
  <path d="M145 35 q0 10 10 10 q-10 0 -10 10 q0 -10 -10 -10 q10 0 10 -10" fill="#A78BFA" />
  <!-- Bottom Left Sparkle -->
  <path d="M35 135 q0 6 6 6 q-6 0 -6 6 q0 -6 -6 -6 q6 0 6 -6" fill="#F472B6" />

  <!-- Analytics Line/Nodes passing behind -->
  <path d="M25 85 l35-15 l40 25 l35-30 l40 25" stroke="#a1a1aa" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.3" />
  <circle cx="25" cy="85" r="3" fill="#a1a1aa" opacity="0.5" />
  <circle cx="60" cy="70" r="3" fill="#a1a1aa" opacity="0.5" />
  <circle cx="100" cy="95" r="3" fill="#a1a1aa" opacity="0.5" />
  <circle cx="135" cy="65" r="3" fill="#a1a1aa" opacity="0.5" />
  <circle cx="175" cy="90" r="3" fill="#a1a1aa" opacity="0.5" />
</svg>